# P2 ENGINE-MVP demo charter (SELF-CONTAINED — NOT the normative template).
#
# Uses the plan §5 execution-binding field shapes (harness / provider / model
# per role) so the driver can route each role to a different harness. This file
# is read LENIENTLY as plain YAML by engine-kit/orchestrator/driver.py; it is
# deliberately NOT validated against schemas/mission-charter.schema.json (that
# schema is being extended concurrently — the driver stays decoupled).
#
# The demo (demo.py) wires a MockAdapter per role, standing in for the real
# harness named in each role's `harness` field. It demonstrates per-role routing:
#   Dev     -> harness claude_code (Anthropic)
#   Review  -> harness headless    (DeepSeek, OpenAI-compatible endpoint)
#   Deliver -> harness claude_code (Anthropic)
# autonomy.level = human_in_the_loop (P2 MVP; no Acceptance state — that is P3).

mission:
  id: M1-demo
  goal: Determine refund eligibility for an order (minimal-greenfield UC-1).

autonomy:
  level: human_in_the_loop
  approved_scope:
    subsprint_sequence:
      - sprint-001
    layers_allowed:
      - semantic_planner
      - prompt_projection
    modules_in_scope:
      - src/tools/eligibility.py
      - src/pipeline/check.py
    explicitly_out_of_scope:
      - src/escalation

budget:
  max_api_usd: 0          # mock adapter — no spend
  max_fix_rounds_total: 2
  max_wall_clock_minutes: 60

tooling:
  # Facet A — per-role execution binding (harness / provider / model).
  research:
    harness: claude_code
    provider: anthropic
    model: claude-opus-4-8
  deliver:
    harness: claude_code
    provider: anthropic
    model: claude-opus-4-8
  dev:
    harness: claude_code
    provider: anthropic
    model: claude-sonnet-4-6
    sandbox: workspace_write
  review:
    harness: headless          # OpenAI-compatible endpoint (multi-model)
    provider: deepseek
    model: deepseek-v4-pro
    endpoint: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY   # value lives in a gitignored .env.local, never here
    tools: [Read, Grep, Glob]
  eval:
    cmd: "true"                # placeholder; F5 eval not wired in P2
    timeout_seconds: 60
