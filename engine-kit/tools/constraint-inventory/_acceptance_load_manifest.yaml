    region: acceptance_cold_start
    parse_token: "<adopter>/AGENTS.md"
    target: "AGENTS.md"
    disposition: RESOLVER_BOUND
    evidence: "bound as adopter_cold_start (self.repo_dir/AGENTS.md) AND framework_cold_start"
