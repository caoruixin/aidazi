  # ===== Cold-start data/criteria inputs (role card §1 steps 7-10) =====
  # Steps 7-8 are PATH-VARIABLE loads ("at the path the orchestrator provided" / "per the F5
  # pattern"), so the layer-(b) parser (which extracts literal backtick paths) does not see them —
  # but they are verdict-affecting (the closure_contract IS the criteria; the F5 evidence IS what is
