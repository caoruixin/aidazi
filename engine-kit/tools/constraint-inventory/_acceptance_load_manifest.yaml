# WP-4 Acceptance LOAD-CLOSURE manifest (build-time only; `_`-prefixed → excluded from the inventory
# row glob). Layer (a) of the three-layer closure proof in engine-kit/tools/acceptance_load_closure.py.
#
# Enumerates EVERY file an Acceptance session may load (proactive cold-start, conditional, on-demand)
# and assigns each a TARGET disposition — exactly one of:
#   INLINED       : its Acceptance content is carried by governance/acceptance-kernel.md (proven by
#                   kernel_equivalence.py --acceptance-kernel-coverage) and embedded into the projected
#                   prompt, so the whole-file read is retired. `target` = the retired file.
#   RESOLVER_BOUND: bound in driver `_acceptance_resolver_graph` so a content change re-invalidates the
#                   §3.5b reuse hash (acceptance_input_hash). `target` = a repo-rel path the resolver
#                   binds literally, OR `data:<purpose>` for a path-variable input bound by purpose.
#   HALT_ROUTED   : an insufficient projection routes to the resumable refinement HALT
#                   (_acceptance_spec_refine_halt), never an unbound read.
#
# `parse_token` is the verbatim backtick token the layer-(b) parser extracts from the source region;
# its presence in the source IS the live "Load X" instruction. `region` namespaces it. Entries with a
# null parse_token are not text-parsed (loaded via the projected prompt or a sentinel) and are verified
# by layer (c) cross-check only.
#
# `status: pending_wp4b` marks an entry whose TARGET disposition is NOT YET true on this tree (WP-4A is
# UNWIRED): the kernel is not embedded and the delivery-loop / role-skill-model triggers + the prior-
# report binding are not yet applied. Layer (c) cross-check SKIPS pending entries (their target isn't
# true yet — that is the point); `closure_state` reports the exact pending set, which the test suite
# asserts explicitly (green) while the STRICT closure assertion is an expectedFailure until WP-4B.

entries:
  # ===== Cold-start governance chain (role card §1 step 1) — RESOLVER_BOUND today =====
  - source: "acceptance-agent.md §1 step 1 — constitution-core (always-load kernel)"
    region: acceptance_cold_start
    parse_token: "aidazi/governance/constitution-core.md"
    target: "governance/constitution-core.md"
    disposition: RESOLVER_BOUND
    evidence: "bound in _acceptance_resolver_graph governance for-loop (WP-2)"
  - source: "acceptance-agent.md §1 step 1 — authoring-kernel (always-load kernel)"
    region: acceptance_cold_start
    parse_token: "aidazi/governance/authoring-kernel.md"
    target: "governance/authoring-kernel.md"
    disposition: RESOLVER_BOUND
    evidence: "bound in _acceptance_resolver_graph governance for-loop (WP-3)"
  - source: "acceptance-agent.md §1 step 1 — context_briefing (always-load)"
    region: acceptance_cold_start
    parse_token: "aidazi/governance/context_briefing.md"
    target: "governance/context_briefing.md"
    disposition: RESOLVER_BOUND
    evidence: "bound in _acceptance_resolver_graph governance for-loop"
  - source: "acceptance-agent.md §1 step 1 — full constitution.md on-demand"
    region: acceptance_cold_start
    parse_token: "constitution.md"
    target: "governance/constitution.md"
    disposition: RESOLVER_BOUND
    evidence: "bound (fail-closed alongside the core kernel) so an on-demand canonical read re-spawns"
  - source: "acceptance-agent.md §1 step 1 — full doc_governance.md on-demand"
    region: acceptance_cold_start
    parse_token: "doc_governance.md"
    target: "governance/doc_governance.md"
    disposition: RESOLVER_BOUND
    evidence: "bound (fail-closed alongside the authoring-kernel) so an on-demand canonical read re-spawns"

  # ===== Cold-start adopter ledgers (role card §1 step 2) — RESOLVER_BOUND today =====
