  # ===== Enumeration completeness note (design §E sources) =====
  # The Acceptance-reachable load set is enumerated from: role-card §1 (cold-start) + §11 (role-skill
  # conditional); context_briefing §2.5 (Acceptance briefing) + §6 (delivery-loop trigger). The other
  # two design-§E sources add NO unbound Acceptance load:
  #  - context_briefing §1.2 is the UNIVERSAL cold-start; its Acceptance-role members are the
  #    governance trio (constitution-core/constitution/authoring-kernel/doc_governance/context_briefing)
  #    + AGENTS.md + docs/current/adoption-state.md — all RESOLVER_BOUND above. Its Control-Plane-only
  #    files (control-plane-routing, action_bank, agent_context_guide, ONBOARDING, state.json) are NOT
  #    role-session loads.
  #  - context_briefing §2.6 is the per-task lookup fallback ("when the role list doesn't cover what
  #    you need"). For an Acceptance VERDICT the role list (role-card §1 + §2.5) is complete, so §2.6
  #    does not fire proactively; the one row Acceptance could reach ("Doc lifecycle question" →
  #    governance/doc_governance.md) is already RESOLVER_BOUND. Any genuine "role list doesn't cover"
  #    need is an INSUFFICIENCY → HALT_ROUTED (below), never an unbound §2.6 read.
  # ===== Insufficiency / "role list doesn't cover" → resumable refinement HALT (never an unbound read) =====
  - source: "insufficient projection (missing/unsigned/incomplete contract, unresolvable conflict, or any §2.6 per-task need the role-list cold-start does not cover)"
    region: null
    parse_token: null
    target: "_acceptance_spec_refine_halt"
    disposition: HALT_ROUTED
    evidence: "driver:_acceptance_spec_refine_halt writes the acceptance_spec_refinement checkpoint, sets STATE_HALTED (resumable), returns _ACCEPTANCE_SPEC_HALT; no fallback file read, no auto-advance."
