# WP-3 authoring-kernel coverage map (build-time only; NOT agent-loaded — the `_` prefix
# excludes it from the inventory row glob, like _sources.yaml / _kernel_coverage.yaml).
#
# Binds each doc-governance inventory row (03-doc-governance.yaml, 41 rows) to the
# CONSTRAINT-ESSENCE phrase(s) governance/authoring-kernel.md MUST contain. A row value is a
# single phrase OR a LIST; with a list EVERY phrase must resolve, so a COMPOUND constraint
# requires a phrase for EACH mandatory subpart and cannot pass while any subpart is dropped
# (non-vacuous, per the WP-2 fidelity-gate convention). Matching is over the kernel's normative
# body only (front-matter + the trailing "## Deferred to the canonical" section stripped),
# whitespace-normalized, markdown-stripped. Proves: (a) completeness — every row mapped;
# (b) no-dangling; (c) resolution — every phrase present. The merged --authoring-kernel-coverage
# CLI ALSO runs the source-hash gate, so a change to the canonical governance/doc_governance.md
# fails this projection stale.
kernel: governance/authoring-kernel.md
source_files:
  - 03-doc-governance.yaml
rows:
  # --- §1 front-matter ---
  doc-s1-frontmatter-block-required: "Every governed doc MUST carry a YAML front-matter block at the very top of the file"
  doc-s1-frontmatter-field-set: "Front-matter MUST declare title, doc_tier, doc_category, status, implementation_status, source_of_truth, last_reviewed, review_cadence, supersedes, superseded_by, load_discipline, size_target, and split_trigger"
  doc-s1-newdoc-frontmatter-dayone:
    - "New docs MUST include front-matter from day one"
    - "only legacy docs may be marked in follow-up PRs"
  # --- §2 allowed values ---
  doc-s2-1-doctier-allowed-and-placement:
    - "doc_tier MUST be one of the enumerated framework/adopter tier values"
    - "the doc MUST live in that tier's designated directory"
    # the enum IS the constraint — require the full value lists so dropping a tier fails the gate
    - "governance, process, role-card, template, application-guide, schema, module, example, archive"
    - "current-runtime, foundational, durable-connective, sprint-archive, proposal, diagnostic, failure-brief, research-brief, acceptance-report, runbook, reference, archived"
  doc-s2-2-status-allowed: "status MUST be one of current, proposal, partial, deferred, diagnostic, archived, or superseded"
  doc-s2-3-implstatus-allowed: "implementation_status MUST be one of implemented, partial, not_started, historical, or unknown"
  # --- §3 load discipline ---
  doc-s3-load-discipline-declared: "Each governed doc MUST declare exactly one load_discipline value of always-load, on-demand, or by-role"
  doc-s3-always-load-governance-only:
    - "always-load MUST be reserved for governance-tier docs"
    - "other docs MUST NOT be marked always-load"
  doc-s3-always-load-promotion-via-foldback: "Promoting an on-demand doc to always-load MUST go through a fold-back proposal with a bloat-cost evaluation"
  # --- §4 closure contract ---
  doc-s4-closure-contract-section-required: "Every docs/research-briefs/<id>.md MUST contain a closure_contract load-bearing body section"
  doc-s4-closure-contract-shape: "The closure_contract MUST contain Positive shape, Anti-pattern, and at least one Anchor phrase"
  doc-s4-anchor-phrases-not-regex:
    - "Anchor phrases MUST be treated as supporting evidence only"
    - "MUST NOT be used as regex/literal matchers"
  doc-s4-closure-contract-immutable:
    - "The closure_contract MUST NOT change between gate-1 sign-off and the milestone's Acceptance run"
    - "without Customer re-sign-off"
  doc-role-research-authors-closure-brief:
    - "The Research role authors docs/research-briefs/<id>.md"
    - "carrying the closure_contract plus scope IN/OUT, anti-goal, and KPI"
  # --- §5 live vs intermediate ---
  doc-s5-doccategory-allowed: "doc_category MUST be either live or intermediate"
  doc-s5-live-kept-current:
    - "A live doc MUST be kept current"
    - "MUST carry last_reviewed, review_cadence, and source_of_truth"
  doc-s5-intermediate-frozen:
    - "An intermediate doc is frozen at creation"
    - "limited to typos/broken-link fixes"
    - "semantic edits are forbidden"
    - "a change of meaning MUST be filed as a new doc referencing the old one"
  # --- §6 cell size ---
  doc-s6-cellsize-target-declared:
    - "Table-cell docs such as handoff §0 declare a cell_size_target front-matter field (default 500 chars)"
    - "soft cold-start-readability signal"
  doc-s6-cellsize-override-rationale: "Raising cell_size_target above the default MUST record the rationale in docs/current/adoption-state.md"
  # --- §7 decision rules ---
  doc-s7-1-code-ahead-update-doc:
    - "When delivered reviewed code diverges from a doc"
    - "confirm the code is intentional and update the doc to reflect delivered behavior"
    - "preferring the lowest-tier doc that captures the change"
  doc-s7-1-no-silent-foundational-rewrite:
    - "A materially-misleading foundational spec MUST be marked with implementation_status plus a notes pointer to the reconciliation file"
    - "MUST NOT be silently rewritten sprint-by-sprint"
  doc-s7-1-no-rollback-to-stale-doc: "Code MUST NOT be rolled back to match a stale doc unless the code is independently wrong"
  doc-s7-2-docs-ahead-keep-and-mark:
    - "When a doc describes not-yet-shipped behavior"
    - "keep the doc and mark it status proposal|partial|deferred"
    - "implementation_status not_started|partial"
  doc-s7-2-superseded-not-deleted:
    - "When a different approach ships"
    - "set superseded_by and add the replacement"
    - "the original MUST NOT be deleted"
  doc-s7-3-true-conflict-reconciliation-note:
    - "two comparable-tier governed docs"
    - "that code does not clearly resolve"
    - "MUST be handled as a governance task by opening a docs/current/ reconciliation note"
    - "naming both docs, the disagreement, and the proposed resolution"
  doc-s7-3-conflict-mark-source-or-both-partial:
    - "On conflict resolution"
    - "mark the non-authoritative doc with superseded_by or a notes pointer"
    - "if unresolvable without a code/product decision"
    - "mark both docs partial and capture the open question"
  doc-s7-4-no-silent-stale-ref-delete:
    - "A stale reference MUST NOT be silently deleted"
    - "update the link"
    - "deleted intentionally"
    - "inline summary plus sprint-archive pointer"
    - "link a stable dir/file not a specific line"
    - "unless the line itself is the contract"
    - "or annotated"
  doc-s7-5-proposals-visible-and-explicit:
    - "Forward-looking proposal docs MUST live alongside foundational docs (not hidden in archives)"
    - "their status MUST make the forward-looking nature explicit"
  doc-s7-5-superseded-proposal-stays-in-tree:
    - "A superseded proposal MUST stay in the tree with status superseded"
    - "superseded_by pointing at the replacement"
  # --- §8 fold-back ---
  doc-s8-foundational-not-patched-per-sprint:
    - "Framework-side foundational docs MUST NOT be patched every sprint"
    - "folded forward only at fold-back sub-sprint cadence"
  doc-s8-foldback-procedure:
    - "At fold-back"
    - "read the relevant reconciliation notes, sprint archives, lessons, and code"
    - "update the foundational doc, bump last_reviewed"
    - "set folded-in redundant reconciliation notes to status archived"
  doc-s8-sprint-archives-immutable:
    - "Sprint archives MUST NEVER be edited during fold-back"
    - "the immutable record of what each sprint delivered"
  # --- §9 archive ops ---
  doc-s9-archive-ordering:
    - "When archiving a live file at sprint close"
    - "commit the current working-tree state first"
    - "git mv the file to its archive path"
    - "add the replacement live file"
  doc-s9-rejected-lessons-path: "Lessons rejected at fold-back MUST be archived to archive/rejected-lessons/<date>-<topic>.md"
  # --- §11 editing governed docs ---
  doc-s11-edit-at-foldback-cadence: "Edits to governance/doc_governance.md MUST land only at fold-back sub-sprint cadence"
  doc-s11-editing-discipline-checklist:
    - "Edits to this governance doc MUST satisfy the editing-discipline checklist"
    - "timelessness, principle-vs-current-state, necessity, durable-shift-vs-reaction"
  doc-s11-adopters-must-not-edit:
    - "Adopters MUST NOT edit governance/doc_governance.md"
    - "per-project overrides go in docs/current/adoption-state.md divergence rows"
  # --- per-role authoring boundaries ---
  doc-role-acceptance-authors-report:
    - "The Acceptance role authors the acceptance verdict JSON, docs/acceptance-reports/<scope>-acceptance-report.md"
    - "the required human-confirm checkpoint under docs/checkpoints/"
    - "on fix_required"
    - "no write access outside docs/acceptance-reports/ and docs/checkpoints/"
  doc-role-deliver-authors-handoff-0-and-12:
    - "The Deliver role authors the handoff §0 cold-start scaffold"
    - "writes the §12 close verdict (Deliver + Customer co-sign)"
  doc-role-dev-authors-handoff-1-to-11:
    - "The Dev role is sole author of handoff §1-§11"
    - "MUST NOT write §12"
    - "does not author §0"
  doc-role-reviewer-appends-codex-findings:
    - "The Code Reviewer writes/appends docs/codex-findings.md (single append-only file)"
    - "MUST NOT edit any file outside it"
