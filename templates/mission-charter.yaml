# Δ-18 Mission Charter — template
#
# Copy to your adopter repo (e.g., <adopter>/charter.yaml or as declared in adoption-state.md).
# Replace <placeholders> with project-specific values. Schema: aidazi/schemas/mission-charter.schema.json.
#
# Hard requirements (charter validator rejects on violation; Constitution §7.0 + §1.7-C/D):
# - tooling.acceptance.on_fix_required.human_confirm_required MUST be true (Constitution §1.7-C).
# - tooling.acceptance.on_fix_required.route_options MUST be non-empty.
# - The 9 default MANDATORY_CHECKPOINTS (process/delivery-loop.md §4.2.3) MUST NOT be bypassed in
#   any of four shapes (omitted/emptied/disabled/overridden) per Constitution §1.7-D.
#   (The 9th, advisory_acceptance_pass_signoff, fires only when Acceptance runs advisory.)
#   Adopters may ADD checkpoints via mandatory_checkpoints_added; they may NOT redefine the
#   9 defaults.
# - At least one of profile_type_a / profile_type_b / profile_type_c MUST be populated.
#
# Suggested defaults (per Constitution §7.0; override with rationale in adoption-state.md):
# - judge_calibration agreement_threshold 0.9; flip_threshold 0.1.
# - tools whitelist for review + acceptance: [Read, Grep, Glob].
# - sandbox: workspace_write for dev.
#
# Optional per-role role-skill fields (process/role-skill-model.md; Constitution §3.4 invariant #6):
# - tooling.<role>.skills: [<skill-name-or-path>, ...]  — each MUST comply with the role's tool whitelist.
# - tooling.<role>.subagent_fanout: true | false        — false forbids intra-role fan-out for that role.
# - Changing tooling.acceptance.skills invalidates judge_calibration.status (re-calibration required).

mission:
  id: <milestone-or-mission-id>
  goal: <one-line user-facing goal — what Customer reads at gate 2>

autonomy:
  # DEFAULT = human_on_the_loop (autonomous-close preset, 2026-06-29). The loop runs itself
  # — dev -> review -> close -> advance — with bounded auto-fix (auto_fix_iteration below), and
  # HALTs only at fail-closed boundaries + the human authority gates. With acceptance.mode:
  # advisory (below) an Acceptance pass still HALTs once at advisory_acceptance_pass_signoff for a
  # single human ship sign-off; it does NOT auto-ship (authoritative auto-ship additionally needs
  # acceptance.mode: auto + a calibrated judge + level: fully_autonomous_within_budget).
  # Dial back to human_in_the_loop for fully manual / paste-driven gating.
  level: human_on_the_loop  # human_in_the_loop | human_on_the_loop | fully_autonomous_within_budget
  approved_scope:
    subsprint_sequence:
      - <sprint-id-1>
      - <sprint-id-2>
    layers_allowed:
      - prompt_projection
      - skill_state
      - semantic_planner
      # Layer set varies by track; see process/profile-aware-maturity.md (Δ-14).
    modules_in_scope:
      - <repo-path-1>
      - <repo-path-2>
    explicitly_out_of_scope:
      - <repo-path-A>
  auto_pass_rules:
    clean_pass_auto_advance: false
    # Bounded auto dev<->review fix iteration — part of the human_on_the_loop autonomous-close
    # default (2026-06-29). Removes the most common mid-loop human halt while staying bounded
    # (max_rounds + severity cap). Set enabled: false to require a human confirm on every Review
    # fix_required.
    auto_fix_iteration:
      enabled: true
      max_rounds: 2
      only_if_findings_severity_at_most: P2
    # adaptive_insert stays DISABLED here: gap-driven Acceptance->Deliver follow-up (Track 2 P2.0)
    # is a separate, pre-authorized in-envelope path that requires its own Constitution amendment
    # before it may be enabled. Do not enable adaptive_insert as part of the autonomy default.
    adaptive_insert:
      enabled: false
      max_inserted_subsprints: 0

budget:
  max_api_usd: 0  # caveat: doesn't track subscription-billed agents (e.g., Codex)
  max_fix_rounds_total: 3
  max_wall_clock_minutes: 240

tooling:
  research:
    # Facet A — execution binding (process/role-configuration-contract.md §1).
    # Shipped defaults: engine-kit/validators/data/role-execution-defaults.yaml
    # agent_kind is the legacy field (schema-required); harness is its v2 successor.
    # Native CLIs are provider-locked: claude_code↔anthropic, codex↔openai.
    # capability_ref names a profile in engine-kit/validators/data/model-registry.yaml.
    agent_kind: claude_code
    harness: claude_code
    provider: anthropic
    model: claude-opus-4-8
    capability_ref: anthropic-opus-judge
    reasoning_effort: xhigh   # Claude Code --effort; Research = deepest reasoning
    network_access: true
    # skills: [<industry-research-skill>]   # optional role skills (process/role-skill-model.md)
    # subagent_fanout: true                 # e.g., parallel domain scouts
  deliver:
    agent_kind: claude_code
    harness: claude_code
    provider: anthropic
    model: claude-opus-4-8
    capability_ref: anthropic-opus-judge
    reasoning_effort: high
    network_access: true
    # skills: [<architecture-decision-skill>]  # optional; e.g., architect/ADR skill slot
    # subagent_fanout: true                    # e.g., architect/frontend/backend plan-draft fan-out
  dev:
    agent_kind: claude_code
    harness: claude_code     # Dev MUST run on a coding-agent harness (edits files)
    provider: anthropic
    model: claude-sonnet-4-6
    capability_ref: anthropic-sonnet-dev
    sandbox: workspace_write
    reasoning_effort: high
    timeout_seconds: 1800    # per-spawn adapter timeout (s); default 600 is low for a real Dev coding session
    network_access: true
    # skills: [<frontend-skill>, <backend-skill>]  # primary mount point for stack-specialist skills
    # subagent_fanout: true                        # sub-agents inherit the dev sandbox transitively
  review:
    agent_kind: codex   # different model class from dev for independence
    harness: codex
    provider: openai
    # Codex model availability is ACCOUNT-TYPE dependent: a ChatGPT-subscription
    # Codex account serves general models (gpt-5.5) and rejects gpt-5-codex (HTTP
    # 400); an API-key Codex account can use gpt-5-codex. The Step 5 Facet A
    # preflight probes this on the adopter's machine.
    model: gpt-5.5
    capability_ref: openai-gpt5-codex
    reasoning_effort: high   # Codex -c model_reasoning_effort=high
    network_access: true
    # headless alternative (multi-model review): harness: headless / provider: deepseek
    # / model: deepseek-v4-pro / endpoint: https://api.deepseek.com/v1
    tools: [Read, Grep, Glob]
    # skills: [anti-hardcode-review-kernel]  # exemplar packaged skill (skills/anti-hardcode-review-kernel/)
    # subagent_fanout: false                 # read-only lenses only if enabled
  eval:
    cmd: <shell-command-orchestrator-runs-for-F5-evidence>
    timeout_seconds: 600
  acceptance:
    mode: advisory  # off | advisory | auto (canonical; new-charter default). advisory runs but HALTs a pass at
                    # advisory_acceptance_pass_signoff for human sign-off; auto auto-ships ONLY when also calibrated
                    # + autonomy fully_autonomous_within_budget. `enabled` is the DEPRECATED alias (true→auto,
                    # false→off), normalized before validation; if both are set they MUST agree.
    agent_kind: codex        # Acceptance = the CUSTOMER/user-perspective judge, run ONCE at MILESTONE close
                             # (not per sub-sprint) — judges the gap to the customer's stated need, NOT code
                             # quality (that's Review). Independence is by ROLE/perspective/timing, so sharing
                             # Review's (codex·openai·gpt-5.5) binding is fine; distinct from dev (claude_code).
    harness: codex
    provider: openai         # codex is provider-locked to openai; calibration is per-(role,provider,model) — §3.6
    model: gpt-5.5
    capability_ref: openai-gpt5-codex   # MUST be a calibratable model (§3.6); gpt-5.5 is (registry: calibratable)
    network_access: true
    tools: [Read, Grep, Glob]
    # skills: [<evidence-reading-skill>]  # evidence-reading ONLY; changing this list invalidates calibration
    judge_calibration:
      status: uncalibrated
      agreement_threshold: 0.9
      flip_threshold: 0.1
      labeled_set_path: calibration/labeled_acceptance_cases/manifest.json
    # OPT-IN (P-C — browser-E2E / user-perspective functional acceptance). ABSENT ⇒ the
    # acceptance class is `static` (M1), today's behavior, byte-identical. Uncomment +
    # add tooling.e2e (below) to switch a USER-FACING milestone to the browser-E2E class.
    # Full spec: process/browser-e2e-acceptance.md.
    # functional:
    #   mode: static                       # static (M1, default) | browser_e2e (M3)
    #   checklist_path: docs/research-briefs/<id>-functional-checklist.json
    #                                      # Research-OWNED, signed + FROZEN at Gate-1
    #                                      # (schemas/functional-checklist.schema.json);
    #                                      # unique criterion_id per user-visible outcome.
    #   judge_calibration_m3:              # M3 is a SEPARATE calibration record from M1
    #     status: uncalibrated             # v1 ships no M3 record ⇒ M3 stays ADVISORY
    #                                      # (a functional pass HALTs at
    #                                      # advisory_acceptance_pass_signoff for sign-off).
    #     record_id: <m3-calibration-record-id>
    run_at: milestone_close
    on_fix_required:
      human_confirm_required: true  # MUST be true; Constitution §1.7-C
      route_options:
        - deliver_fix_iteration
        - re_acceptance_after_evidence
        - research_contract_revision

  # OPT-IN (P-C — browser-E2E executor MECHANICS; the HOW, Deliver/adopter-owned, MUTABLE).
  # REQUIRED only when tooling.acceptance.functional.mode: browser_e2e (above). The MECHANICS
  # produce evidence; they NEVER define pass/fail (the signed functional-checklist does, and
  # Acceptance judges read-only). Local/demo only in v1: no auth, no remote deploy, no cloud
  # browser. Shape: schemas/executor-contract.schema.json. The driver injects per-run values
  # (substitutes {port}/{store}/{mode} in app_start_cmd; sets a concrete base_url with an
  # allocated port). Leaving this commented keeps the static (M1) default unchanged.
  # e2e:
  #   executor_kind: local_http            # local_http (deterministic, offline CI) | playwright
  #                                        #   (real browser, env-gated AIDAZI_E2E_PLAYWRIGHT=1)
  #   app_start_cmd: ["python", "-m", "myapp", "--port", "{port}", "--store", "{store}"]
  #   readiness: { url: /__health, timeout_seconds: 20 }
  #   base_url: http://127.0.0.1            # LOCAL only; portless (driver injects the port)
  #   allowed_origins: ["http://127.0.0.1"] # LOCAL origins the executor may navigate (fail-closed)
  #   shutdown: { process_owned: true }     # orchestrator terminates the process it started
  #   journeys:
  #     - id: happy_path
  #       steps:
  #         - { action: navigate, url: / }
  #         - { action: fill, selector: "#name", value: "Ada" }
  #         - { action: click, submit_url: /submit, form: { name: "Ada" } }
  #         - { action: assert_text, selector: "#result", text: "Welcome, Ada",
  #             criterion_id: shows_welcome, critical: true }   # criterion_id MUST exist in
  #                                                             # the signed checklist; critical
  #                                                             # ⇒ a CAPTURED failure vetoes a
  #                                                             # milestone pass (→ needs_human)

# OPTIONAL — Loop Memory substrate (modules/m-memory.md). Top-level, runtime-owned
# md files (sibling of the runtime-owned `audit`). DEFAULT OFF: with enabled:false
# (or this block absent) the driver NEVER touches the store — byte-identical to no
# memory. Flip enabled:true to let the loop inject prior generalizable lessons into
# role prompts at ingress and record lessons at close. It does NOT raise autonomy,
# does NOT auto-edit any load-bearing artifact (skill/charter/prompt), and adds NO
# checkpoint — but it DOES change prompt context, so RECORD the enable decision in
# adoption-state.md and keep the existing calibration policy (§3.6). A relative
# `root` resolves against THIS charter's directory and must stay inside it; the CLI
# `--memory-root` overrides this block for an external path.
memory:
  enabled: false
  root: memory   # <adopter>/memory — version-controlled, diffable, adopter-portable

# T1 profile overlay — populate one or more.

profile_type_a:
  layer_set:
    - infra
    - java_guard
    - prompt_projection
    - skill_state
    - semantic_planner
    - eval_spec
    - product_policy
    - judge_calibration
    - human_review_required
  closure_contract_source: research_brief
  bad_case_lifecycle: process/badcase-lifecycle.md
  phase_pipeline_required: true

